variables:
  USERNAME: ""        # ใส่ SAP username
  PASSWORD: ""        # ใส่ SAP password (หรือเว้นว่าง bot จะถามตอน Start)
  COMPANY_CODE: "1000"

states:
  - name: "SAP Login"
    trigger:
      type: image
      file: "triggers/sap_login.png"
      confidence: 0.85
      timeout: 15
    loop: "loop_login"

loops:
  loop_login:
    steps:
      - action: click_image
        target: "elements/username_field.png"
        timeout: 5
      - action: type
        text: "{USERNAME}"
      - action: key
        key: "tab"
      - action: type
        text: "{PASSWORD}"
      - action: key
        key: "enter"
